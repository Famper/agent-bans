services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: kanban-app:dev
    container_name: kanban-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: "file:/data/db/kanban.db"
      UPLOAD_DIR: "/data/uploads"
      AUTH_SECRET: "${AUTH_SECRET:-dev-only-change-in-prod-aaaaaaaaaaaaaaaa}"
      AUTH_TRUST_HOST: "true"
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      SEED_DEMO_USER: "${SEED_DEMO_USER:-0}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./public:/app/public
      - ./middleware.ts:/app/middleware.ts
      - ./next.config.ts:/app/next.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./postcss.config.mjs:/app/postcss.config.mjs
      # next-env.d.ts НЕ монтируем: он автогенерируется Next внутри контейнера и
      # лежит в .gitignore. Если bind-mount'ить отсутствующий на хосте файл, Docker
      # создаёт на его месте директорию → Next падает с EISDIR на /app/next-env.d.ts.
      - app-node-modules:/app/node_modules
      - app-next-cache:/app/.next
      - kanban-db:/data/db
      - kanban-uploads:/data/uploads
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kanban-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  app-node-modules:
  app-next-cache:
  kanban-db:
  kanban-uploads:
